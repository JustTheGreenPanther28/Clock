<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulding Clock</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>

<body>
    <div id="clock">
        <button id="digital">Digital Clock</button>
        <button id="analog">Analog Clock</button>

        <div id="digital-clock">
            <div id="digital-clock-heading">Digital Clock</div>
            <div id="time-row">
                <div class="time" id="hrs">XX</div>
                <div class="colon">:</div>
                <div class="time" id="mins">XX</div>
                <div class="colon">:</div>
                <div class="time" id="seconds">XX</div>
            </div>
        </div>
        <div id="analog-clock">
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="minute-hand"></div>
            <div class="hand second-hand" id="second-hand"></div>
            <div class="center-dot"></div>
        </div>
    </div>
</body>

</html>
