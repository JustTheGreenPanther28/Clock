<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Poster</title>
    <link rel="stylesheet" href="style.css">
</head>

<script defer src="app.js"></script>

<body>

    <div class="poster">

        <!-- Profile -->
        <div id="profile">

            <img id="profileImage" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8qh6bj65apXQ5cNMTGlRUO4JgHCyR0zNNitLecRMgYkfrvbxMuD_rVvQ&s=10">

        </div>

        <!-- Text -->
        <div class="content">

            <h1>Happy Birthday</h1>

            <h2 id="name">______</h2>

            <p>
                <img src="heart.png" width="50">
            </p>

        </div>

    </div>

    <div class="download">
        <button><img src="download.png" width="50"></button>
    </div>

    <div id="search">
        <input type="search" id="nameinput" placeholder="Enter your name (e.g. Ankit Kumar)">
    </div>

    <div class="buttons">
        <button id="left">⇦</button>
        <button id="right">⇨</button>
        <button id="top">⇧</button>
        <button id="bottom">⇩</button>
    </div>

    <div id="fitfill">
        <button id="fit"><img src="fit.png" width="40"></button>
        <button id="fill"><img src="fill.jpg" width="40"></button>
    </div>

     <div class="upload">
        <input type="file" id="imageInput" accept="image/*">
        <div id="title">(UPLOAD IMAGE)</div>
    </div>

    <div class="magnification">
        <button id="zoomIn"><img src="zoom-in-button.png" width="25"></button>
        <button id="zoomOut"><img src="zoom-out.png" width="25"></button>
    </div>
</body>

</html>
